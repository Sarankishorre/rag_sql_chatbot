<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Titanic SQL Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c10;
    --surface: #13151c;
    --surface2: #1c1f2a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #4af0c4;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #7b8098;
    --danger: #f87171;
    --success: #4af0c4;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* ── header ── */
  header {
    position: relative;
    z-index: 2;
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(11,12,16,0.85);
    backdrop-filter: blur(12px);
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.error { background: var(--danger); }

  /* ── main layout ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 65px);
  }

  /* ── sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 1.5rem 1.25rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  aside h3 {
    font-family: var(--font-head);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .example-btn {
    display: block;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 300;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 0.4rem;
    line-height: 1.4;
  }
  .example-btn:hover {
    background: var(--surface2);
    border-color: var(--border2);
    color: var(--accent);
  }

  .schema-list { display: flex; flex-direction: column; gap: 4px; }
  .schema-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    padding: 4px 6px;
    border-radius: 5px;
    color: var(--muted);
  }
  .schema-tag .col-name { color: var(--text); font-family: var(--font-mono); font-size: 0.72rem; }
  .dtype-badge {
    margin-left: auto;
    font-size: 0.65rem;
    font-family: var(--font-mono);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--accent2);
    border: 1px solid var(--border);
  }

  /* ── chat area ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* scrollbar */
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── welcome card ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 1rem;
    text-align: center;
    padding: 4rem 2rem;
    animation: fadeUp 0.5s ease both;
  }
  .welcome-icon { font-size: 2.5rem; }
  .welcome h2 {
    font-family: var(--font-head);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome p { color: var(--muted); font-size: 0.9rem; max-width: 380px; line-height: 1.6; }

  /* ── message bubbles ── */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    animation: fadeUp 0.3s ease both;
  }

  .msg-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .msg-label span { font-size: 12px; }

  .user-bubble {
    align-self: flex-end;
    max-width: 70%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px 14px 4px 14px;
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .assistant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    overflow: hidden;
  }

  /* sql block */
  .sql-block {
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    background: rgba(74, 240, 196, 0.04);
  }
  .sql-label {
    font-size: 0.65rem;
    font-family: var(--font-mono);
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sql-code {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: #c4b5fd;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* table */
  .table-wrap {
    overflow-x: auto;
    padding: 0.75rem 1rem 1rem;
  }
  .count-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    background: rgba(74, 240, 196, 0.1);
    color: var(--accent);
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 0.6rem;
    border: 1px solid rgba(74, 240, 196, 0.2);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left;
    padding: 6px 10px;
    font-family: var(--font-head);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 7px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.78rem;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .error-card {
    background: rgba(248, 113, 113, 0.07);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 10px;
    padding: 1rem;
    color: var(--danger);
    font-size: 0.85rem;
    font-family: var(--font-mono);
  }

  /* ── thinking indicator ── */
  .thinking {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 0.82rem;
    padding: 0.5rem 0;
    animation: fadeUp 0.3s ease both;
  }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
    opacity: 0.4;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ── input area ── */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    background: rgba(11,12,16,0.9);
    backdrop-filter: blur(12px);
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 0.6rem 0.75rem;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(74, 240, 196, 0.4); }

  #questionInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 300;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
    padding: 2px 0;
  }
  #questionInput::placeholder { color: var(--muted); }

  #sendBtn {
    background: var(--accent);
    color: #0b0c10;
    border: none;
    border-radius: 8px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 16px;
  }
  #sendBtn:hover { background: #6bf5d2; transform: scale(1.05); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.5rem;
    text-align: center;
  }

  /* ── api config banner ── */
  .api-config {
    background: rgba(167, 139, 250, 0.08);
    border: 1px solid rgba(167, 139, 250, 0.2);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.8rem;
    color: #c4b5fd;
  }
  .api-config input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #c4b5fd;
    font-family: var(--font-mono);
    font-size: 0.78rem;
  }
  .api-config input::placeholder { color: rgba(167, 139, 250, 0.4); }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── mobile ── */
  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
    aside { display: none; }
    .messages { padding: 1rem; }
    .input-area { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🚢</div>
  <div>
    <h1>Titanic SQL Assistant</h1>
    <p>Natural language → SQL → Results</p>
  </div>
  <div class="status-dot">
    <div class="dot" id="statusDot"></div>
    <span id="statusLabel">Connecting…</span>
  </div>
</header>

<main>
  <!-- sidebar -->
  <aside>
    <div>
      <h3>Try asking</h3>
      <button class="example-btn" onclick="setQuestion('How many passengers survived?')">How many passengers survived?</button>
      <button class="example-btn" onclick="setQuestion('What is the average age of passengers by class?')">Average age by passenger class?</button>
      <button class="example-btn" onclick="setQuestion('Show top 10 oldest passengers who survived')">Top 10 oldest survivors?</button>
      <button class="example-btn" onclick="setQuestion('What percentage of women survived vs men?')">Survival rate by gender?</button>
      <button class="example-btn" onclick="setQuestion('Count passengers by embarkation port')">Passengers per port?</button>
      <button class="example-btn" onclick="setQuestion('What was the highest fare paid?')">Highest fare paid?</button>
    </div>

    <div>
      <h3>Dataset columns</h3>
      <div class="schema-list" id="schemaList">
        <!-- populated by JS -->
      </div>
    </div>
  </aside>

  <!-- chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤿</div>
        <h2>Dive into the data</h2>
        <p>Ask anything about the Titanic dataset in plain English. I'll convert it to SQL and return the results instantly.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="api-config">
        <span>🔌</span>
        <input type="text" id="apiUrl" placeholder="Backend URL — e.g. http://localhost:8000" value= value="https://matha-rubbly-sigrid.ngrok-free.dev">
      </div>
      <div class="input-row">
        <textarea id="questionInput" rows="1" placeholder="Ask a question about the Titanic data…"></textarea>
        <button id="sendBtn" onclick="sendQuery()" title="Send">➤</button>
      </div>
      <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
    </div>
  </div>
</main>

<script>
const COLUMNS = [
  { name: "PassengerId", dtype: "int64" },
  { name: "Survived",    dtype: "int64" },
  { name: "Pclass",      dtype: "int64" },
  { name: "Name",        dtype: "object" },
  { name: "Sex",         dtype: "object" },
  { name: "Age",         dtype: "float64" },
  { name: "SibSp",       dtype: "int64" },
  { name: "Parch",       dtype: "int64" },
  { name: "Ticket",      dtype: "object" },
  { name: "Fare",        dtype: "float64" },
  { name: "Cabin",       dtype: "object" },
  { name: "Embarked",    dtype: "object" },
];

// render sidebar schema
const schemaList = document.getElementById("schemaList");
COLUMNS.forEach(c => {
  const el = document.createElement("div");
  el.className = "schema-tag";
  el.innerHTML = `<span class="col-name">${c.name}</span><span class="dtype-badge">${c.dtype}</span>`;
  schemaList.appendChild(el);
});

// auto-resize textarea
const textarea = document.getElementById("questionInput");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
});
textarea.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

// health check
async function checkHealth() {
  const url = document.getElementById("apiUrl").value.trim();
  const dot = document.getElementById("statusDot");
  const label = document.getElementById("statusLabel");
  try {
    const r = await fetch(`${url}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      dot.className = "dot online";
      label.textContent = "Connected";
    } else throw new Error();
  } catch {
    dot.className = "dot error";
    label.textContent = "Offline";
  }
}
checkHealth();
setInterval(checkHealth, 10000);
document.getElementById("apiUrl").addEventListener("change", checkHealth);

function setQuestion(q) {
  textarea.value = q;
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
  textarea.focus();
}

function removeWelcome() {
  const w = document.getElementById("welcome");
  if (w) w.remove();
}

function appendUserMsg(text) {
  removeWelcome();
  const container = document.getElementById("messages");
  const el = document.createElement("div");
  el.className = "msg";
  el.innerHTML = `
    <div class="msg-label"><span>👤</span> You</div>
    <div class="user-bubble">${escHtml(text)}</div>
  `;
  container.appendChild(el);
  return el;
}

function appendThinking() {
  const container = document.getElementById("messages");
  const el = document.createElement("div");
  el.className = "thinking";
  el.innerHTML = `
    <div class="thinking-dots"><span></span><span></span><span></span></div>
    <span>Generating SQL & querying…</span>
  `;
  container.appendChild(el);
  scrollBottom();
  return el;
}

function appendResult(data) {
  const container = document.getElementById("messages");
  const el = document.createElement("div");
  el.className = "msg";

  if (!data.success) {
    el.innerHTML = `
      <div class="msg-label"><span>🤖</span> Assistant</div>
      <div class="error-card">❌ ${escHtml(data.error)}</div>
    `;
  } else {
    const tableHtml = buildTable(data.columns, data.rows);
    el.innerHTML = `
      <div class="msg-label"><span>🤖</span> Assistant</div>
      <div class="assistant-card">
        <div class="sql-block">
          <div class="sql-label">Generated SQL</div>
          <div class="sql-code">${escHtml(data.sql)}</div>
        </div>
        <div class="table-wrap">
          <div class="count-badge">⬤ ${data.count} row${data.count !== 1 ? "s" : ""} returned</div>
          ${tableHtml}
        </div>
      </div>
    `;
  }
  container.appendChild(el);
  scrollBottom();
}

function buildTable(cols, rows) {
  if (!cols || cols.length === 0) return '<p style="color:var(--muted);font-size:.82rem;">No results.</p>';
  const header = cols.map(c => `<th>${escHtml(c)}</th>`).join("");
  const body = rows.map(row =>
    "<tr>" + cols.map(c => `<td>${row[c] === null || row[c] === undefined ? '<span style="color:var(--muted)">NULL</span>' : escHtml(String(row[c]))}</td>`).join("") + "</tr>"
  ).join("");
  return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
}

function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function sendQuery() {
  const input = textarea.value.trim();
  if (!input) return;

  const btn = document.getElementById("sendBtn");
  btn.disabled = true;
  textarea.value = "";
  textarea.style.height = "auto";

  appendUserMsg(input);
  const thinking = appendThinking();

  const url = document.getElementById("apiUrl").value.trim();

  try {
    const res = await fetch(`${url}/query`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: input }),
    });
    const data = await res.json();
    thinking.remove();
    appendResult(data);
  } catch (err) {
    thinking.remove();
    appendResult({ success: false, error: `Could not reach backend at ${url}. Is it running?` });
  }

  btn.disabled = false;
  textarea.focus();
}
</script>
</body>
</html>
